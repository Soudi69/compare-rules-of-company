version: '3.8'

services:
  # Ollama service for LLM - using official image from Docker Hub
  ollama:
    image: ollama/ollama:latest
    container_name: ai-rules-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-rules-network
    restart: unless-stopped

  # Backend API service
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ai-rules-backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama2
      - LOG_LEVEL=INFO
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-rules-network
    restart: unless-stopped

  # Frontend service
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-rules-frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ai-rules-network
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000

# Named volume for Ollama data persistence
volumes:
  ollama_data:
    driver: local

# Custom network for service communication
networks:
  ai-rules-network:
    driver: bridge
